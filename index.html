<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節約管理カレンダー</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* ── Loading overlay ── */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #667eea; font-size: 14px; }

        /* ── Setup banner (shown when GAS_URL not set) ── */
        .setup-banner {
            display: none;
            background: #fff7ed;
            border-left: 4px solid #f59e0b;
            padding: 14px 20px;
            font-size: 13px;
            color: #92400e;
            line-height: 1.7;
        }
        .setup-banner.visible { display: block; }
        .setup-banner a { color: #d97706; font-weight: bold; }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 20px; }

        .month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .month-nav button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .month-nav button:hover { background: rgba(255,255,255,0.3); }
        .month-display { font-size: 24px; font-weight: bold; min-width: 120px; }

        .goal-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        .goal-section label { font-size: 14px; }
        .goal-section input {
            width: 150px;
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        .goal-section input::placeholder { color: rgba(255,255,255,0.7); }
        .goal-section input:focus { outline: none; border-color: white; background: rgba(255,255,255,0.2); }

        /* ── Main content ── */
        .content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 1024px) { .content { grid-template-columns: 1fr; } }

        .progress-section { display: flex; flex-direction: column; gap: 20px; min-width: 0; }

        .stats {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            min-width: 0;
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: bold; color: #333; }
        .stat-value.goal { color: #667eea; }
        .stat-value.achieved { color: #10b981; }
        .stat-value.remaining { color: #f59e0b; }

        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; min-width: 0; }
        @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }

        .chart-container {
            position: relative;
            height: 300px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-width: 0;
            overflow: hidden;
        }

        /* ── Calendar ── */
        .calendar-section { display: flex; flex-direction: column; gap: 15px; min-width: 0; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .weekday-header {
            text-align: center;
            font-weight: bold;
            color: #666;
            padding: 10px 0;
            font-size: 12px;
            text-transform: uppercase;
        }
        .calendar-day {
            aspect-ratio: 1;
            background: #f8f9fa;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .calendar-day:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,0.2); transform: translateY(-2px); }
        .calendar-day.other-month { opacity: 0.3; cursor: default; }
        .calendar-day.other-month:hover { border-color: #e5e7eb; box-shadow: none; transform: none; }
        .calendar-day.has-data { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: #667eea; }
        .calendar-day.has-data .day-number { color: white; }
        .calendar-day.has-data .day-amount { color: white; font-weight: bold; }
        .calendar-day.today { border-color: #10b981; background: #ecfdf5; border-width: 2px; }
        .calendar-day.today.has-data { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        /* マイナスセル：白ハッチング・黒文字・赤金額 */
        .calendar-day.has-data.minus { background: repeating-linear-gradient(-45deg, #fef2f2 0px, #fef2f2 6px, #ffffff 6px, #ffffff 12px); border-color: #fca5a5; color: #1f2937; }
        .calendar-day.has-data.minus .day-number { color: #1f2937; }
        .calendar-day.has-data.minus .day-amount { color: #dc2626; }

        .day-number { font-size: 12px; font-weight: bold; color: #333; }
        .day-amount { font-size: 11px; font-weight: 700; color: #667eea; text-align: right; white-space: nowrap; }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 8px; }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus { outline: none; border-color: #667eea; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-save { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .btn-delete:hover { background: #fca5a5; }
        .btn-cancel { background: #f3f4f6; color: #555; }
        .btn-cancel:hover { background: #e5e7eb; }
        .btn-close-modal { float: right; background: none; border: none; font-size: 24px; color: #999; cursor: pointer; padding: 0; width: 30px; height: 30px; }
        .btn-close-modal:hover { color: #333; }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            body { padding: 10px; }

            .header { padding: 18px 16px; }
            .header h1 { font-size: 20px; margin-bottom: 14px; }

            .month-nav { gap: 10px; margin-bottom: 14px; }
            .month-nav button { padding: 8px 12px; font-size: 14px; }
            .month-display { font-size: 20px; min-width: 100px; }

            .goal-section { gap: 6px; flex-wrap: wrap; justify-content: center; }
            .goal-section input { width: 120px; font-size: 14px; }

            .content { padding: 16px; gap: 16px; }

            .stats { padding: 12px; gap: 8px; }
            .stat-value { font-size: 18px; }
            .stat-label { font-size: 11px; }

            .chart-container { height: 220px; padding: 12px; }

            .calendar-section { order: -1; }

            .calendar-grid { gap: 4px; }
            .calendar-day { padding: 4px; border-radius: 6px; border-width: 1px; }
            .day-number { font-size: 11px; }
            .day-amount { font-size: 9px; }
        }

        /* ── Save status indicator ── */
        .save-status {
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            height: 16px;
            color: #10b981;
            transition: opacity 0.5s;
        }

        /* ── History list ── */
        .history-list {
            display: none;
            margin-top: 16px;
            border-top: 1px solid #e5e7eb;
            padding-top: 12px;
        }
        .history-list.visible { display: block; }
        .history-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .history-time { font-size: 11px; color: #9ca3af; min-width: 36px; }
        .history-amount { font-size: 13px; font-weight: 700; color: #10b981; min-width: 72px; }
        .history-amount.neg { color: #dc2626; }
        .history-memo { flex: 1; font-size: 12px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-del {
            background: none; border: none; color: #d1d5db;
            cursor: pointer; font-size: 18px; line-height: 1;
            padding: 2px 5px; border-radius: 4px; flex-shrink: 0;
        }
        .history-del:hover { color: #ef4444; background: #fee2e2; }
        .history-total {
            font-size: 13px; font-weight: 700; color: #374151;
            text-align: right; margin-top: 10px; padding-top: 8px;
            border-top: 2px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">データを読み込んでいます...</div>
    </div>

    <div class="container">
        <!-- Setup banner -->
        <div class="setup-banner" id="setupBanner">
            ⚠️ <strong>初回セットアップが必要です。</strong>
            Google Apps Script をデプロイして取得した URL を、
            <code>index.html</code> の先頭にある <code>GAS_URL</code> 変数に設定してください。<br>
            詳しい手順は <code>gas/Code.gs</code> の冒頭コメントを参照してください。<br>
            <em>※ 設定が完了するまではブラウザのローカルストレージにデータを一時保存します。</em>
        </div>

        <!-- Header -->
        <div class="header">
            <h1>💰 節約管理カレンダー</h1>
            <div class="month-nav">
                <button id="prevMonth">← 前月</button>
                <div class="month-display" id="monthDisplay"></div>
                <button id="nextMonth">次月 →</button>
            </div>
            <div class="goal-section">
                <label for="goalInput">月の目標金額：</label>
                <input type="number" id="goalInput" placeholder="例：30000" min="0">
                <span>円</span>
            </div>
        </div>

        <!-- Main content -->
        <div class="content">
            <div class="progress-section">
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-label">目標額</div>
                        <div class="stat-value goal" id="goalDisplay">¥0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">達成額</div>
                        <div class="stat-value achieved" id="achievedDisplay">¥0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">残り額</div>
                        <div class="stat-value remaining" id="remainingDisplay">¥0</div>
                    </div>
                </div>
                <div class="charts">
                    <div class="chart-container"><canvas id="progressChart"></canvas></div>
                    <div class="chart-container"><canvas id="dailyChart"></canvas></div>
                </div>
            </div>

            <div class="calendar-section">
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="btn-close-modal" id="closeModal">&times;</button>
            <div class="modal-header" id="modalDate"></div>
            <form id="dataForm">
                <div class="form-group">
                    <label for="amountInput">節約できた金額</label>
                    <input type="number" id="amountInput" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label for="memoInput">メモ（任意）</label>
                    <textarea id="memoInput" placeholder="例：コーヒー代を節約"></textarea>
                </div>
            </form>
            <div class="modal-buttons">
                <button class="btn btn-save" id="saveBtn">保存</button>
                <button class="btn btn-delete" id="deleteBtn" style="display:none">削除</button>
                <button class="btn btn-cancel" id="cancelBtn">キャンセル</button>
            </div>
            <div class="save-status" id="saveStatus"></div>
            <div class="history-list" id="historyList">
                <div class="history-label">この日の入力履歴</div>
                <div id="historyItems"></div>
                <div class="history-total" id="historyTotal"></div>
            </div>
        </div>
    </div>

    <script>
    // ════════════════════════════════════════════════════
    // ★ GAS デプロイ後、下記URLを貼り替えてください ★
    // ════════════════════════════════════════════════════
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzrsLv55qRclcoydmJmjdfws71ABVIeYHfS8nMFZybTVnVtdSWn9umlTclla3BybLw4ZA/exec';
    // ════════════════════════════════════════════════════

    const useGAS = GAS_URL !== 'YOUR_GAS_WEB_APP_URL';

    // ── State ────────────────────────────────────────────
    let currentDate = new Date();
    let selectedDate = null;
    let progressChart = null;
    let dailyChart = null;
    let currentProgress = 0;
    let monthCache = {};   // "YYYY-MM" → { goal, days }
    let isSaving = false;

    // ── Setup banner ─────────────────────────────────────
    if (!useGAS) {
        document.getElementById('setupBanner').classList.add('visible');
    }

    // ── Loading ───────────────────────────────────────────
    function showLoading(show) {
        document.getElementById('loadingOverlay').classList.toggle('active', show);
    }

    // ── GAS API ───────────────────────────────────────────
    async function gasGet(key) {
        const res = await fetch(`${GAS_URL}?key=${encodeURIComponent(key)}`);
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'GAS error');
        return json.data;
    }

    async function gasSave(key, value) {
        await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'save', key, value })
        });
    }

    // ── Data keys ─────────────────────────────────────────
    function getMonthKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        return `savings_${y}_${m}`;
    }

    function cacheKey(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function getDateKey(date) {
        // ローカル日付で YYYY-MM-DD を生成（タイムゾーンのズレを防ぐ）
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // ── Month init: load from GAS (or localStorage fallback) ─
    async function initMonth(date) {
        const ck = cacheKey(date);
        if (monthCache[ck]) return;   // already in cache

        showLoading(true);
        const mk = getMonthKey(date);

        if (useGAS) {
            try {
                const data = await gasGet(mk);
                monthCache[ck] = data || { goal: 0, days: {} };
                // sync local backup
                localStorage.setItem(mk, JSON.stringify(monthCache[ck]));
            } catch (e) {
                console.warn('GAS fetch failed, falling back to localStorage', e);
                const stored = localStorage.getItem(mk);
                monthCache[ck] = stored ? JSON.parse(stored) : { goal: 0, days: {} };
            }
        } else {
            const stored = localStorage.getItem(mk);
            monthCache[ck] = stored ? JSON.parse(stored) : { goal: 0, days: {} };
        }

        showLoading(false);
    }

    // ── Cache-backed data accessors (synchronous) ─────────
    function getMonthData(date) {
        return monthCache[cacheKey(date)] || { goal: 0, days: {} };
    }

    function saveMonthData(date, data) {
        const ck = cacheKey(date);
        monthCache[ck] = data;

        const mk = getMonthKey(date);
        localStorage.setItem(mk, JSON.stringify(data));   // local backup

        if (useGAS) {
            gasSave(mk, data).catch(e => console.warn('GAS save failed', e));
        }
    }

    function getDayData(date) {
        const raw = getMonthData(date).days[getDateKey(date)];
        if (!raw) return null;
        // 旧形式（entries なし）を新形式に変換して返す
        if (!raw.entries) {
            return { amount: raw.amount, entries: [{ amount: raw.amount, memo: raw.memo || '', time: '' }] };
        }
        return raw;
    }

    function addDayData(date, amount, memo) {
        const monthData = getMonthData(date);
        const dateKey = getDateKey(date);
        const raw = monthData.days[dateKey];
        const newAmount = parseInt(amount, 10);
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const newEntry = { amount: newAmount, memo: memo || '', time: timeStr };

        let entries;
        if (raw) {
            entries = raw.entries
                ? [...raw.entries]
                : [{ amount: raw.amount, memo: raw.memo || '', time: '' }];
            entries.push(newEntry);
        } else {
            entries = [newEntry];
        }

        monthData.days[dateKey] = {
            amount: entries.reduce((sum, e) => sum + e.amount, 0),
            entries
        };
        saveMonthData(date, monthData);
    }

    function deleteEntry(date, idx) {
        const monthData = getMonthData(date);
        const dateKey = getDateKey(date);
        const raw = monthData.days[dateKey];
        if (!raw) return;
        const entries = raw.entries
            ? [...raw.entries]
            : [{ amount: raw.amount, memo: raw.memo || '', time: '' }];
        entries.splice(idx, 1);
        if (entries.length === 0) {
            delete monthData.days[dateKey];
        } else {
            monthData.days[dateKey] = { amount: entries.reduce((sum, e) => sum + e.amount, 0), entries };
        }
        saveMonthData(date, monthData);
    }

    function removeDayData(date) {
        const monthData = getMonthData(date);
        delete monthData.days[getDateKey(date)];
        saveMonthData(date, monthData);
    }

    function getTotalSavings(date) {
        return Object.values(getMonthData(date).days)
            .reduce((sum, d) => sum + d.amount, 0);
    }

    // ── Amount-based cell color ───────────────────────────
    function getAmountStyle(amount) {
        if (amount == null || amount === '') return null;

        if (amount < 0) return null;  // マイナスは CSS .minus クラスで対応

        if (amount < 100) return null;

        if (amount < 500) {
            const t = (amount - 100) / 400;
            const sat = Math.round(60 + t * 30);
            const l1  = Math.round(75 - t * 22);
            const l2  = Math.round(58 - t * 20);
            return {
                bg:     `linear-gradient(135deg, hsl(215,${sat}%,${l1}%), hsl(230,${sat}%,${l2}%))`,
                border: `hsl(215,${sat}%,${l2 - 8}%)`
            };
        } else if (amount < 1000) {
            const t = (amount - 500) / 500;
            const sat = Math.round(55 + t * 35);
            const l1  = Math.round(68 - t * 18);
            const l2  = Math.round(50 - t * 15);
            return {
                bg:     `linear-gradient(135deg, hsl(145,${sat}%,${l1}%), hsl(160,${sat}%,${l2}%))`,
                border: `hsl(145,${sat}%,${l2 - 8}%)`
            };
        } else {
            const t = Math.min((amount - 1000) / 4000, 1);
            const sat = Math.round(65 + t * 25);
            const l1  = Math.round(70 - t * 20);
            const l2  = Math.round(52 - t * 15);
            return {
                bg:     `linear-gradient(135deg, hsl(0,${sat}%,${l1}%), hsl(12,${sat}%,${l2}%))`,
                border: `hsl(0,${sat}%,${l2 - 8}%)`
            };
        }
    }

    // ── Chart center-text plugin ──────────────────────────
    const centerTextPlugin = {
        id: 'centerText',
        afterDraw(chart) {
            if (chart.config.type !== 'doughnut') return;
            const { ctx, chartArea } = chart;
            const cx = (chartArea.left + chartArea.right) / 2;
            const cy = (chartArea.top + chartArea.bottom) / 2;
            const pct = Math.max(0, Math.min(100, currentProgress));

            ctx.save();
            ctx.font = 'bold 30px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = pct >= 100 ? '#10b981' : '#374151';
            ctx.fillText(`${pct.toFixed(1)}%`, cx, cy - 10);
            ctx.font = '13px sans-serif';
            ctx.fillStyle = '#9ca3af';
            ctx.fillText('達成率', cx, cy + 18);
            ctx.restore();
        }
    };

    // ── UI: month heading ─────────────────────────────────
    function updateMonthDisplay() {
        const y = currentDate.getFullYear();
        const m = currentDate.getMonth() + 1;
        document.getElementById('monthDisplay').textContent = `${y}年${m}月`;
    }

    // ── UI: stats & charts ────────────────────────────────
    function updateGoalDisplay() {
        const md       = getMonthData(currentDate);
        const goal     = md.goal;
        const achieved = getTotalSavings(currentDate);
        const remaining = Math.max(0, goal - achieved);

        document.getElementById('goalDisplay').textContent    = `¥${goal.toLocaleString()}`;
        document.getElementById('achievedDisplay').textContent = `¥${achieved.toLocaleString()}`;
        document.getElementById('remainingDisplay').textContent = `¥${remaining.toLocaleString()}`;
        document.getElementById('goalInput').value = goal || '';

        updateCharts(goal, achieved);
    }

    function updateCharts(goal, achieved) {
        const remaining = Math.max(0, goal - achieved);
        currentProgress = goal > 0 ? (achieved / goal) * 100 : 0;

        // Doughnut
        if (progressChart) {
            progressChart.data.datasets[0].data = [achieved, remaining];
            progressChart.data.labels = [
                `達成: ¥${achieved.toLocaleString()}`,
                `残り: ¥${remaining.toLocaleString()}`
            ];
            progressChart.update();
        } else {
            const ctx = document.getElementById('progressChart').getContext('2d');
            progressChart = new Chart(ctx, {
                type: 'doughnut',
                plugins: [centerTextPlugin],
                data: {
                    labels: [`達成: ¥${achieved.toLocaleString()}`, `残り: ¥${remaining.toLocaleString()}`],
                    datasets: [{ data: [achieved, remaining], backgroundColor: ['#10b981','#e5e7eb'], borderColor: ['#059669','#d1d5db'], borderWidth: 2 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        // Bar
        const lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
        const labels = [], data = [];
        for (let d = 1; d <= lastDay; d++) {
            const dd = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);
            labels.push(`${d}日`);
            data.push(getDayData(dd)?.amount || 0);
        }

        if (dailyChart) {
            dailyChart.data.labels = labels;
            dailyChart.data.datasets[0].data = data;
            dailyChart.update();
        } else {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            dailyChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: '節約額', data, backgroundColor: 'rgba(102,126,234,0.7)', borderColor: '#667eea', borderWidth: 1 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { callback: v => '¥' + v.toLocaleString() } } }
                }
            });
        }
    }

    // ── UI: calendar ──────────────────────────────────────
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        ['日','月','火','水','木','金','土'].forEach(day => {
            const h = document.createElement('div');
            h.className = 'weekday-header';
            h.textContent = day;
            grid.appendChild(h);
        });

        const firstDay  = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
        const startDate = new Date(firstDay);
        startDate.setDate(startDate.getDate() - firstDay.getDay());

        const todayStr = getDateKey(new Date());

        for (let i = 0; i < 42; i++) {
            const dayDate = new Date(startDate);
            dayDate.setDate(startDate.getDate() + i);

            const cell = document.createElement('div');
            cell.className = 'calendar-day';

            if (dayDate.getMonth() !== currentDate.getMonth()) {
                cell.classList.add('other-month');
            }
            if (getDateKey(dayDate) === todayStr) {
                cell.classList.add('today');
            }

            const dayData = getDayData(dayDate);
            if (dayData) {
                cell.classList.add('has-data');
                if (dayData.amount < 0) {
                    cell.classList.add('minus');
                } else {
                    const s = getAmountStyle(dayData.amount);
                    if (s) { cell.style.background = s.bg; cell.style.borderColor = s.border; }
                }
            }

            const num = document.createElement('div');
            num.className = 'day-number';
            num.textContent = dayDate.getDate();
            cell.appendChild(num);

            if (dayData) {
                const amt = document.createElement('div');
                amt.className = 'day-amount';
                amt.textContent = `¥${dayData.amount.toLocaleString()}`;
                cell.appendChild(amt);
            }

            if (dayDate.getMonth() === currentDate.getMonth()) {
                cell.addEventListener('click', () => openModal(dayDate));
            }
            grid.appendChild(cell);
        }
    }

    // ── Modal ─────────────────────────────────────────────
    function renderHistoryList(date) {
        const data = getDayData(date);
        const list  = document.getElementById('historyList');
        const items = document.getElementById('historyItems');
        const total = document.getElementById('historyTotal');
        items.innerHTML = '';

        if (!data || !data.entries || data.entries.length === 0) {
            list.classList.remove('visible');
            return;
        }
        list.classList.add('visible');
        data.entries.forEach((entry, idx) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span class="history-time">${entry.time || '--:--'}</span>
                <span class="history-amount ${entry.amount < 0 ? 'neg' : ''}">${entry.amount >= 0 ? '+' : ''}¥${entry.amount.toLocaleString()}</span>
                <span class="history-memo">${entry.memo || ''}</span>
                <button class="history-del" data-idx="${idx}" title="この項目を削除">×</button>
            `;
            items.appendChild(div);
        });
        total.textContent = `合計 ¥${data.amount.toLocaleString()}`;
    }

    function openModal(date) {
        selectedDate = new Date(date);
        const data = getDayData(date);

        document.getElementById('modalDate').textContent =
            `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        document.getElementById('amountInput').value = '';
        document.getElementById('memoInput').value   = '';
        document.getElementById('deleteBtn').style.display = data ? 'block' : 'none';
        document.getElementById('saveStatus').textContent = '';
        renderHistoryList(date);
        document.getElementById('modal').classList.add('active');
        setTimeout(() => document.getElementById('amountInput').focus(), 50);
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        selectedDate = null;
    }

    async function saveData() {
        if (isSaving) return;
        const amount = document.getElementById('amountInput').value;
        const memo   = document.getElementById('memoInput').value;

        if (amount === '' || amount === null || amount === undefined) {
            alert('金額を入力してください');
            return;
        }

        isSaving = true;
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';

        addDayData(selectedDate, amount, memo);
        renderCalendar();
        updateGoalDisplay();
        renderHistoryList(selectedDate);

        // 入力欄をリセットして連続入力しやすくする
        document.getElementById('amountInput').value = '';
        document.getElementById('memoInput').value   = '';
        document.getElementById('deleteBtn').style.display = 'block';

        await new Promise(r => setTimeout(r, useGAS ? 600 : 0));

        saveBtn.disabled = false;
        saveBtn.textContent = '保存';
        isSaving = false;
        document.getElementById('amountInput').focus();
    }

    async function deleteData() {
        if (!confirm('このデータを削除しますか？')) return;
        removeDayData(selectedDate);
        closeModal();
        renderCalendar();
        updateGoalDisplay();
    }

    // ── Display orchestrator ──────────────────────────────
    async function updateDisplay() {
        await initMonth(currentDate);
        updateMonthDisplay();
        updateGoalDisplay();
        renderCalendar();
    }

    // ── Event listeners ───────────────────────────────────
    document.getElementById('prevMonth').addEventListener('click', async () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        await updateDisplay();
    });

    document.getElementById('nextMonth').addEventListener('click', async () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        await updateDisplay();
    });

    document.getElementById('goalInput').addEventListener('change', e => {
        const md = getMonthData(currentDate);
        md.goal = parseInt(e.target.value, 10) || 0;
        saveMonthData(currentDate, md);
        updateGoalDisplay();
    });

    document.getElementById('saveBtn').addEventListener('click', saveData);
    document.getElementById('deleteBtn').addEventListener('click', deleteData);
    document.getElementById('cancelBtn').addEventListener('click', closeModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);

    document.getElementById('modal').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            saveData();
        }
    });

    document.getElementById('memoInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            e.stopPropagation();
            saveData();
        }
    });

    document.getElementById('historyItems').addEventListener('click', e => {
        const btn = e.target.closest('.history-del');
        if (!btn || !selectedDate) return;
        deleteEntry(selectedDate, parseInt(btn.dataset.idx));
        renderHistoryList(selectedDate);
        renderCalendar();
        updateGoalDisplay();
        const data = getDayData(selectedDate);
        document.getElementById('deleteBtn').style.display = data ? 'block' : 'none';
    });

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === document.getElementById('modal')) closeModal();
    });

    // ── Boot ──────────────────────────────────────────────
    updateDisplay();
    </script>
</body>
</html>
